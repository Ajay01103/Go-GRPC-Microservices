syntax = "proto3";

package voice;

option go_package = "github.com/go-grpc-sqlc/voice/gen/pb;pb";

// ─── Enums ────────────────────────────────────────────────────────────────────

enum VoiceCategory {
  VOICE_CATEGORY_UNSPECIFIED = 0;
  VOICE_CATEGORY_GENERAL     = 1;
  VOICE_CATEGORY_NARRATION   = 2;
  VOICE_CATEGORY_CHARACTER   = 3;
}

enum VoiceVariant {
  VOICE_VARIANT_UNSPECIFIED = 0;
  VOICE_VARIANT_MALE        = 1;
  VOICE_VARIANT_FEMALE      = 2;
  VOICE_VARIANT_NEUTRAL     = 3;
}

// ─── Shared Message ───────────────────────────────────────────────────────────

message VoiceItem {
  string         id          = 1;
  string         name        = 2;
  string         description = 3;
  VoiceCategory  category    = 4;
  string         language    = 5;
  VoiceVariant   variant     = 6;
}

// ─── GetAll ───────────────────────────────────────────────────────────────────

message GetAllVoicesRequest {
  string user_id = 1;
  string query   = 2; // optional search term
}

message GetAllVoicesResponse {
  repeated VoiceItem voices = 1;
}

// ─── Delete ───────────────────────────────────────────────────────────────────

message DeleteVoiceRequest {
  string id      = 1;
  string user_id = 2;
}

message DeleteVoiceResponse {
  bool success = 1;
}

// ─── Playback URL ────────────────────────────────────────────────────────────

message GetVoicePlaybackUrlRequest {
  string voice_id = 1;
}

message GetVoicePlaybackUrlResponse {
  string url             = 1;
  int64  expires_at_unix = 2;
}

// ─── Create ───────────────────────────────────────────────────────────────────

message CreateVoiceRequest {
  string        name         = 1;
  string        description  = 2;
  VoiceCategory category     = 3;
  string        language     = 4;
  VoiceVariant  variant      = 5;
  bytes         audio_data   = 6;
  string        content_type = 7;
}

message CreateVoiceResponse {
  VoiceItem voice = 1;
}

// ─── Update ───────────────────────────────────────────────────────────────────

message UpdateVoiceRequest {
  string        id          = 1;
  string        user_id     = 2;
  string        name        = 3;
  string        description = 4;
  VoiceCategory category    = 5;
  string        language    = 6;
}

message UpdateVoiceResponse {
  VoiceItem voice = 1;
}

// ─── Service ──────────────────────────────────────────────────────────────────

service VoiceService {
  rpc GetAllVoices(GetAllVoicesRequest) returns (GetAllVoicesResponse);
  rpc DeleteVoice(DeleteVoiceRequest)   returns (DeleteVoiceResponse);
  rpc GetVoicePlaybackUrl(GetVoicePlaybackUrlRequest) returns (GetVoicePlaybackUrlResponse);
  rpc CreateVoice(CreateVoiceRequest)   returns (CreateVoiceResponse);
  rpc UpdateVoice(UpdateVoiceRequest)   returns (UpdateVoiceResponse);
}
